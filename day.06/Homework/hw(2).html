<!-- Text Formatting refers to the way text is visually styled 
 to enhance its appearance and readability.

 Regular Formatting Tags:
 These tags (e.g., <b>, <i>, <u>) are used to change how text looks.
 They focus on visual presentation without providing any 
 specific meaning or context. Their primary purpose is to 
 emphasize or differentiate text visually.

 Semantic Tags:
 These tags (e.g., <strong>, <em>, <mark>) convey meaning 
 beyond just appearance. They provide context about the 
 importance or role of the text within the content. 
 This helps search engines and assistive technologies 
 understand the content better, improving accessibility 
 and Search Engine Optimization(SEO).

 In summary:
 - Regular tags enhance visual style without meaning.
 - Semantic tags add meaningful context and improve 
 accessibility and search engine understanding.-->
